<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app">
      <h1>To-Do List</h1>
      <section class="task-input-section">
        <input
          type="text"
          id="input-area"
          placeholder="Write task and Press Add"
        />
        <button class="btn" id="add-btn">Add</button>
      </section>
      <section class="task-collection">
        <ul class="task-list" id="task-list">
          <!-- Tasks will be dynamically added here -->
        </ul>
      </section>
      <footer>
        <div class="special-buttons">
          <button class="btn" id="delete-completed-btn">
            Delete all Completed tasks
          </button>
          <button class="btn" id="complete-all-btn">
            Mark all as Completed
          </button>
          <button class="btn" id="delete-all-btn">Delete all tasks</button>
        </div>
      </footer>
    </main>
    <script src="script.js"></script>
  </body>
</html>
